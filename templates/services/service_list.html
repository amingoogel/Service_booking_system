{% extends 'base.html' %}
{% block title %}جستجوی سرویس‌ها{% endblock %}
{% block content %}
<h2 class="mb-4">جستجو و فیلتر سرویس‌ها</h2>

<form id="search-form" class="row g-3 mb-4 bg-light p-3 rounded">
    <div class="col-md-3">
        <label class="form-label">{{ form.q.label }}</label>
        <input type="text" name="q" id="search-q" class="form-control" value="{{ form.q.value|default:'' }}" placeholder="نام سرویس...">
    </div>
    <div class="col-md-2">
        <label class="form-label">{{ form.category.label }}</label>
        {{ form.category }}
    </div>
    <div class="col-md-2">
        <label class="form-label">{{ form.provider.label }}</label>
        {{ form.provider }}
    </div>
    <div class="col-md-2">
        <label class="form-label">{{ form.min_price.label }}</label>
        {{ form.min_price }}
    </div>
    <div class="col-md-2">
        <label class="form-label">{{ form.max_price.label }}</label>
        {{ form.max_price }}
    </div>
</form>

<div id="search-results">
    {% include 'services/_service_cards.html' %}
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/search.js"></script>
{% endblock %}
