{% extends 'base.html' %}
{% block title %}تغییر رمز عبور{% endblock %}
{% block content %}
<h2>تغییر رمز عبور</h2>
<div class="col-md-6">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">تغییر رمز</button>
    </form>
</div>
{% endblock %}
