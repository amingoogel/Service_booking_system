{% extends 'base.html' %}
{% block title %}پروفایل{% endblock %}
{% block content %}
<h2>ویرایش پروفایل</h2>
<p class="text-muted">نام کاربری ({{ user.username }}) قابل تغییر نیست.</p>
<div class="row">
    <div class="col-md-3 text-center mb-3">
        <img src="{{ user.get_profile_image_url }}" class="rounded-circle img-thumbnail" width="150" alt="">
    </div>
    <div class="col-md-6">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">ذخیره</button>
        </form>
    </div>
</div>
{% endblock %}
